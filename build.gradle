buildscript {
    repositories { mavenCentral() }
    dependencies { classpath 'org.yaml:snakeyaml:2.6' }
}

plugins {
    id 'java'
    id 'application'
    id 'com.gradleup.shadow' version '8.3.5'
    id 'jacoco'
}

group = 'org.triplehelix'
version = '0.8.2'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

// Generate Version.java from the Gradle project version — single source of truth.
// The generated file goes to build/generated/sources so it doesn't conflict with src/.
def generatedSrcDir = file("${buildDir}/generated/sources/version/java")

tasks.register('generateVersionSource') {
    def outputFile = file("${generatedSrcDir}/org/triplehelix/wpilogmcp/Version.java")
    inputs.property('version', project.version)
    outputs.file(outputFile)
    doLast {
        outputFile.parentFile.mkdirs()
        outputFile.text = """\
package org.triplehelix.wpilogmcp;

/**
 * Auto-generated from build.gradle version property.
 * Do not edit - change the version in build.gradle instead.
 */
public final class Version {
  public static final String VERSION = "${project.version}";
  private Version() {}
}
"""
    }
}

sourceSets.main.java.srcDir generatedSrcDir
compileJava.dependsOn generateVersionSource

jacoco {
    toolVersion = "0.8.11"
}

jacocoTestReport {
    reports {
        xml.required = true
        html.required = true
    }
}

test {
    finalizedBy jacocoTestReport
}

repositories {
    mavenCentral()
    maven { url 'https://frcmaven.wpi.edu/artifactory/release/' }
}

// Configuration for native libraries (ZIP artifacts need extraction)
configurations {
    testNatives
}

dependencies {
    // WPILib utilities for DataLog reading
    implementation 'edu.wpi.first.wpiutil:wpiutil-java:2026.2.2'
    implementation 'edu.wpi.first.wpimath:wpimath-java:2026.2.2'

    // JSON processing for MCP protocol
    implementation 'com.google.code.gson:gson:2.11.0'

    // YAML configuration support
    implementation 'org.yaml:snakeyaml:2.6'

    // Binary serialization for disk cache
    implementation 'org.msgpack:msgpack-core:0.9.8'

    // In-memory cache with weight-based eviction for lazy log value loading
    implementation 'com.github.ben-manes.caffeine:caffeine:3.1.8'

    // Logging
    implementation 'org.slf4j:slf4j-api:2.0.13'
    implementation 'org.slf4j:slf4j-simple:2.0.13'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // WPILib C++ natives for DataLogWriter tests (JNI is bundled inside cpp artifacts in 2026)
    // Only include the platform-specific artifact for the current OS
    def osName = System.getProperty('os.name').toLowerCase()
    if (osName.contains('mac')) {
        testNatives 'edu.wpi.first.wpiutil:wpiutil-cpp:2026.2.2:osxuniversal@zip'
    } else if (osName.contains('win')) {
        testNatives 'edu.wpi.first.wpiutil:wpiutil-cpp:2026.2.2:windowsx86-64@zip'
    } else {
        testNatives 'edu.wpi.first.wpiutil:wpiutil-cpp:2026.2.2:linuxx86-64@zip'
    }
}

// Task to extract native libraries from ZIP files
tasks.register('extractTestNatives', Copy) {
    configurations.testNatives.files.each { file ->
        from(zipTree(file)) {
            include '**/shared/*.dylib'
            include '**/shared/*.so'
            include '**/shared/*.dll'
        }
    }
    into "$buildDir/testnatives"
}

// Make test task depend on native extraction and set the library path
tasks.named('test') {
    dependsOn extractTestNatives
    systemProperty 'wpilib.natives.path', "$buildDir/testnatives"
}

application {
    mainClass = 'org.triplehelix.wpilogmcp.Main'
}

shadowJar {
    archiveBaseName.set('wpilog-mcp')
    archiveClassifier.set('all')
    archiveVersion.set(version)

    manifest {
        attributes 'Main-Class': 'org.triplehelix.wpilogmcp.Main'
    }
}

tasks.named('test') {
    useJUnitPlatform()
}

// Convenience task to build the fat JAR
tasks.register('buildMcp') {
    dependsOn shadowJar
    doLast {
        println "Built: build/libs/wpilog-mcp-${version}-all.jar"
    }
}

// ==================== Install Task ====================
// Installs wpilog-mcp to ~/.wpilog-mcp/ with versioned JAR, launcher script,
// and a default config file (if none exists).
//
// Layout:
//   ~/.wpilog-mcp/
//   ├── jars/wpilog-mcp-{version}.jar    # versioned JARs (multiple versions can coexist)
//   ├── bin/
//   │   ├── wpilog-mcp-{version}.sh      # versioned launcher script
//   │   └── wpilog-mcp -> wpilog-mcp-{version}.sh  # symlink to current version
//   └── servers.json                      # server configurations (preserved on upgrade)

tasks.register('install') {
    dependsOn shadowJar
    group = 'application'
    description = 'Install wpilog-mcp to ~/.wpilog-mcp/'

    doLast {
        def home = System.getProperty('user.home')
        def installDir = file("${home}/.wpilog-mcp")
        def jarsDir = file("${installDir}/jars")
        def binDir = file("${installDir}/bin")
        def os = System.getProperty('os.name', '').toLowerCase()
        def isWindows = os.contains('win')

        // Create directory structure
        jarsDir.mkdirs()
        binDir.mkdirs()

        // Copy the shadow JAR with versioned name
        def jarName = "wpilog-mcp-${version}.jar"
        def targetJar = file("${jarsDir}/${jarName}")
        def sourceJar = file("${buildDir}/libs/wpilog-mcp-${version}-all.jar")
        if (!sourceJar.exists()) {
            throw new GradleException("Shadow JAR not found: ${sourceJar}")
        }
        copy {
            from sourceJar
            into jarsDir
            rename { jarName }
        }
        println "Installed JAR: ${targetJar}"

        if (isWindows) {
            // Windows batch launcher
            def batFile = file("${binDir}/wpilog-mcp-${version}.bat")
            batFile.text = """\
@echo off
setlocal EnableDelayedExpansion
REM wpilog-mcp ${version} launcher
REM Auto-generated by ./gradlew install

REM Memory management is automatic. Set WPILOG_MAX_HEAP to control heap size.
set MAX_HEAP=%WPILOG_MAX_HEAP%
if "%MAX_HEAP%"=="" set MAX_HEAP=4g

REM Prefer WPILib JDK if available (scans for latest year)
set JAVA_EXEC=java
set WPILIB_FOUND=0
for /f "tokens=*" %%D in ('dir /b /ad /o-n "%USERPROFILE%\\wpilib" 2^>nul') do (
    if "!WPILIB_FOUND!"=="0" if exist "%USERPROFILE%\\wpilib\\%%D\\jdk\\bin\\java.exe" (
        set JAVA_EXEC=%USERPROFILE%\\wpilib\\%%D\\jdk\\bin\\java.exe
        set WPILIB_FOUND=1
    )
)
if "!WPILIB_FOUND!"=="0" (
    for /f "tokens=*" %%D in ('dir /b /ad /o-n "C:\\Users\\Public\\wpilib" 2^>nul') do (
        if "!WPILIB_FOUND!"=="0" if exist "C:\\Users\\Public\\wpilib\\%%D\\jdk\\bin\\java.exe" (
            set JAVA_EXEC=C:\\Users\\Public\\wpilib\\%%D\\jdk\\bin\\java.exe
            set WPILIB_FOUND=1
        )
    )
)

"%JAVA_EXEC%" -Xmx%MAX_HEAP% -jar "${jarsDir.absolutePath.replace('/', '\\')}\\${jarName}" %*
"""
            println "Installed launcher: ${batFile}"

            // Create "current" copy
            def currentBat = file("${binDir}/wpilog-mcp.bat")
            currentBat.text = batFile.text
            println "Updated current: ${currentBat}"
        } else {
            // Unix shell launcher
            def scriptFile = file("${binDir}/wpilog-mcp-${version}")
            scriptFile.text = """\
#!/bin/sh
# wpilog-mcp ${version} launcher
# Auto-generated by ./gradlew install

# Memory management is automatic. Set WPILOG_MAX_HEAP to control JVM heap size.
# More heap = more room for decoded log values in cache.
MAX_HEAP="\${WPILOG_MAX_HEAP:-4g}"

# Prefer WPILib JDK if available (scans for latest year)
JAVA_EXEC="java"
for year in \$(ls -1rd "\${HOME}/wpilib"/*/ 2>/dev/null | head -10); do
    if [ -f "\${year}jdk/bin/java" ]; then
        JAVA_EXEC="\${year}jdk/bin/java"
        break
    fi
done
# Fallback to JAVA_HOME if WPILib JDK not found
if [ "\${JAVA_EXEC}" = "java" ] && [ -n "\${JAVA_HOME}" ] && [ -f "\${JAVA_HOME}/bin/java" ]; then
    JAVA_EXEC="\${JAVA_HOME}/bin/java"
fi

exec "\${JAVA_EXEC}" -Xmx\${MAX_HEAP} -jar "${jarsDir.absolutePath}/${jarName}" "\$@"
"""
            scriptFile.setExecutable(true)
            println "Installed launcher: ${scriptFile}"

            // Create/update "current" symlink
            def currentLink = file("${binDir}/wpilog-mcp").toPath()
            java.nio.file.Files.deleteIfExists(currentLink)
            java.nio.file.Files.createSymbolicLink(currentLink, scriptFile.toPath().fileName)
            println "Updated symlink: ${currentLink} -> ${scriptFile.name}"
        }

        // Create default config if none exists (YAML preferred, but respect existing JSON)
        // The ~/riologs path works cross-platform — the app expands ~ to the user's home dir.
        def yamlConfig = file("${installDir}/servers.yaml")
        def jsonConfig = file("${installDir}/servers.json")
        if (!yamlConfig.exists() && !jsonConfig.exists()) {
            yamlConfig.text = """\
# wpilog-mcp server configuration
# Documentation: https://github.com/TripleHelixProgramming/wpilog-mcp#configuration

# ---- Defaults ----
# Top-level settings are inherited by all server configurations below.
# Individual servers can override any of these.

# Your FRC team number (used for TBA match lookups)
team: 2363

# Directory containing .wpilog files downloaded from the roboRIO
logdir: ~/riologs

# The Blue Alliance API key (get one at https://www.thebluealliance.com/account)
# tba_key: your-key-here

# ---- Server Configurations ----
servers:

  # Default: stdio transport for MCP clients (Claude Desktop, etc.)
  default:
    transport: stdio

  # HTTP transport for browser-based or multi-client access
  http:
    transport: http
    port: 2363

  # Stress testing configuration
  # Set TBA_API_KEY environment variable before running stress tests
  stresstest:
    tba_key: \${TBA_API_KEY}
"""
            println "Created default config: ${yamlConfig}"
            println "  Edit this file to set your team number and log directory."
        } else if (yamlConfig.exists()) {
            println "Config file already exists: ${yamlConfig} (not overwritten)"
        } else {
            println "Config file already exists: ${jsonConfig} (not overwritten)"
        }

        println ""
        if (isWindows) {
            println "Add to your PATH:  ${binDir}"
            println ""
            println "Usage:"
            println "  wpilog-mcp [options]              Legacy CLI mode"
            println "  wpilog-mcp start default           Start named config (stdio)"
            println "  wpilog-mcp start http              Start named config (HTTP daemon)"
        } else {
            // Check if bin dir is already on PATH
            def pathDirs = System.getenv('PATH')?.split(':') ?: []
            if (!pathDirs.contains(binDir.absolutePath)) {
                println "Add to your shell profile (~/.zshrc or ~/.bashrc):"
                println "  export PATH=\"\${HOME}/.wpilog-mcp/bin:\$PATH\""
                println ""
            }
            println "Usage:"
            println "  wpilog-mcp [options]              Legacy CLI mode"
            println "  wpilog-mcp start default           Start named config (stdio)"
            println "  wpilog-mcp start http              Start named config (HTTP daemon)"
        }
    }
}

// ==================== VS Code Extension ====================
// Copies the shadow JAR into vscode-extension/server/ for local development.
// After running this, cd into vscode-extension/ and run: npm install && npm run compile
// Then press F5 in VS Code to launch an Extension Development Host.

tasks.register('bundleExtension', Copy) {
    dependsOn shadowJar
    group = 'application'
    description = 'Copy shadow JAR into vscode-extension/server/ for local dev'

    from(shadowJar.archiveFile)
    into("${projectDir}/vscode-extension/server")
    rename { 'wpilog-mcp-all.jar' }
}

// ==================== Build VS Code Extension ====================
// Builds the shadow JAR, bundles it into the extension, compiles the extension,
// and packages it as a VSIX. Does NOT install it.
// Requires: npm (Node.js) on PATH.

tasks.register('buildExtension', Exec) {
    dependsOn 'bundleExtension'
    group = 'application'
    description = 'Build and package the VS Code extension as a .vsix'

    def extDir = "${projectDir}/vscode-extension"
    def extVersion = new groovy.json.JsonSlurper()
            .parse(file("${extDir}/package.json")).version
    def vsixFile = "wpilog-analyzer-${extVersion}.vsix"

    workingDir extDir
    def isWindows = System.getProperty('os.name').toLowerCase().contains('windows')
    if (isWindows) {
        commandLine 'cmd', '/c', "npm install --silent && npm run compile && npx @vscode/vsce package --no-dependencies -o ${vsixFile}"
    } else {
        commandLine 'bash', '-c', "npm install --silent && npm run compile && npx @vscode/vsce package --no-dependencies -o '${vsixFile}'"
    }

    doFirst {
        println "Building WPILog Analyzer VS Code extension v${extVersion}..."
    }
    doLast {
        println "Extension packaged: vscode-extension/${vsixFile}"
    }
}

// ==================== Install VS Code Extension ====================
// Builds the extension and installs it into VS Code.
// Requires: npm (Node.js) on PATH. Close VS Code before running.

tasks.register('installExtension', Exec) {
    dependsOn 'buildExtension'
    group = 'application'
    description = 'Build, package, and install the VS Code extension into VS Code'

    def extDir = "${projectDir}/vscode-extension"
    def extVersion = new groovy.json.JsonSlurper()
            .parse(file("${extDir}/package.json")).version
    def vsixFile = "wpilog-analyzer-${extVersion}.vsix"

    // Find VS Code CLI — prefer WPILib VS Code, fall back to system 'code'
    def isWindows = System.getProperty('os.name').toLowerCase().contains('windows')
    def codeBin = 'code'
    def wpiYear = java.time.Year.now().value
    def wpiCodePaths = isWindows ? [
        "C:/Users/Public/wpilib/${wpiYear}/vscode/bin/code.cmd",
        "${System.getProperty('user.home')}/wpilib/${wpiYear}/vscode/bin/code.cmd",
    ] : [
        "${System.getProperty('user.home')}/wpilib/${wpiYear}/vscode/bin/code",
        "/usr/local/bin/code",
    ]
    for (def p : wpiCodePaths) {
        if (new File(p).exists()) { codeBin = p; break }
    }

    workingDir extDir
    if (isWindows) {
        commandLine 'cmd', '/c', "\"${codeBin}\" --install-extension ${vsixFile} --force"
    } else {
        commandLine 'bash', '-c', "\"${codeBin}\" --install-extension '${vsixFile}' --force"
    }

    doFirst {
        println "Installing WPILog Analyzer VS Code extension v${extVersion}..."
    }
    doLast {
        println "Extension installed. Restart VS Code to activate."
    }
}

// ==================== Stress Test Task ====================
// Stress tests load configuration from the "stresstest" named config in servers.json.
// The default config includes a stresstest entry. Set your logdir and TBA_API_KEY env var:
//
//   {
//     "logdir": "/path/to/your/logs",
//     "servers": {
//       "stresstest": {
//         "tba_key": "${TBA_API_KEY}"
//       }
//     }
//   }

import groovy.json.JsonSlurper

/**
 * Checks if a "stresstest" configuration exists in any config file (YAML or JSON).
 * Returns the config file path if found, or null if not configured.
 */
/**
 * Finds a config file with a "stresstest" server entry, or returns null.
 * When null, the Java stress test code synthesizes defaults (~/riologs, team 2363, TBA from env).
 */
String findStressTestConfig(String explicitPath) {
    if (explicitPath) {
        def f = new File(explicitPath)
        if (!f.exists()) {
            throw new GradleException("Config file not found: ${explicitPath}")
        }
        return explicitPath
    }

    def candidates = [
        new File(projectDir, '.wpilog-mcp.yaml'),
        new File(projectDir, '.wpilog-mcp.json'),
        new File(System.getProperty('user.home'), '.wpilog-mcp/servers.yaml'),
        new File(System.getProperty('user.home'), '.wpilog-mcp/servers.json'),
    ]

    for (candidate in candidates) {
        if (candidate.exists()) {
            try {
                def parsed
                if (candidate.name.endsWith('.yaml') || candidate.name.endsWith('.yml')) {
                    parsed = new org.yaml.snakeyaml.Yaml().load(candidate.text)
                } else {
                    parsed = new JsonSlurper().parse(candidate)
                }
                if (parsed?.servers?.stresstest != null) {
                    return candidate.absolutePath
                }
            } catch (Exception e) {
                // Skip unparseable files
            }
        }
    }
    return null
}

/**
 * Returns the JVM heap size for stress tests.
 * Uses WPILOG_MAX_HEAP env var or defaults to 4g.
 */
String computeHeapSize(String configFile) {
    def envHeap = System.getenv('WPILOG_MAX_HEAP')
    if (envHeap) {
        println "Heap size: ${envHeap} (from WPILOG_MAX_HEAP)"
        return envHeap
    }
    return '4g'
}

tasks.register('stdioStressTest') {
    description = 'Run stdio integration stress test'
    group = 'verification'
    dependsOn extractTestNatives

    doLast {
        String explicitPath = project.findProperty('configpath') ?: ''
        String configFile = findStressTestConfig(explicitPath)
        def heapSize = computeHeapSize(configFile)

        println ''
        println '========================================'
        println 'wpilog-mcp Stdio Stress Test'
        println '========================================'
        println "Config: ${configFile ?: '(defaults: ~/riologs, team 2363, TBA from env)'}"
        println "Heap: ${heapSize}"
        println ''

        def result = javaexec {
            classpath = sourceSets.test.runtimeClasspath
            mainClass = 'org.junit.platform.console.ConsoleLauncher'

            args 'execute',
                 '--select-class', 'org.triplehelix.wpilogmcp.integration.StressTest',
                 '--details', 'tree',
                 '--details-theme', 'unicode',
                 '--disable-banner'

            maxHeapSize = heapSize

            standardOutput = System.out
            errorOutput = System.err

            systemProperty 'stress.enabled', 'true'
            if (configFile) {
                systemProperty 'stress.configpath', configFile
            }
            systemProperty 'wpilib.natives.path', "${buildDir}/testnatives"

            // SLF4J: suppress server internals, only show warnings and errors
            systemProperty 'org.slf4j.simpleLogger.defaultLogLevel', 'warn'

            ignoreExitValue = true
        }

        if (result.exitValue != 0) {
            println "\nStdio stress tests completed with failures (exit code: ${result.exitValue})"
        }
    }
}

tasks.register('httpStressTest') {
    description = 'Run HTTP transport stress test'
    group = 'verification'
    dependsOn 'compileTestJava', extractTestNatives

    doLast {
        String explicitPath = project.findProperty('configpath') ?: ''
        String configFile = findStressTestConfig(explicitPath)
        def heapSize = computeHeapSize(configFile)

        println ''
        println '========================================'
        println 'HTTP Transport Stress Test'
        println '========================================'
        println "Config: ${configFile ?: '(defaults: ~/riologs, team 2363, TBA from env)'}"
        println "Heap: ${heapSize}"
        println ''

        def result = javaexec {
            classpath = sourceSets.test.runtimeClasspath
            mainClass = 'org.junit.platform.console.ConsoleLauncher'

            args 'execute',
                 '--select-class', 'org.triplehelix.wpilogmcp.integration.HttpStressTest',
                 '--details', 'tree',
                 '--details-theme', 'unicode',
                 '--disable-banner'

            maxHeapSize = heapSize

            standardOutput = System.out
            errorOutput = System.err

            systemProperty 'stress.enabled', 'true'
            if (configFile) {
                systemProperty 'stress.configpath', configFile
            }
            systemProperty 'wpilib.natives.path', "${buildDir}/testnatives"
            systemProperty 'org.slf4j.simpleLogger.defaultLogLevel', 'warn'

            ignoreExitValue = true
        }

        if (result.exitValue != 0) {
            println "\nHTTP stress tests completed with failures (exit code: ${result.exitValue})"
        }
    }
}

tasks.register('stressTest') {
    description = 'Run both stdio and HTTP stress tests'
    group = 'verification'
    dependsOn 'stdioStressTest', 'httpStressTest'
}

// Add JUnit Platform Console dependency for stressTest task
dependencies {
    testRuntimeOnly 'org.junit.platform:junit-platform-console:1.10.2'
}

tasks.register('measureMemory') {
    dependsOn classes
    doLast {
        def logPath = project.findProperty('logfile') ?: ''
        if (!logPath) {
            throw new GradleException('Usage: ./gradlew measureMemory -Plogfile=/path/to/file.wpilog')
        }
        javaexec {
            classpath = sourceSets.main.runtimeClasspath
            mainClass = 'org.triplehelix.wpilogmcp.Main'
            maxHeapSize = '4g'
            // We'll use a special --measure flag
            args '--measure-memory', logPath
        }
    }
}
