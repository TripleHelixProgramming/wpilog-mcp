plugins {
    id 'java'
    id 'application'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
    id 'jacoco'
}

group = 'org.triplehelix'
version = '0.8.1'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

// Generate Version.java from the Gradle project version — single source of truth.
// The generated file goes to build/generated/sources so it doesn't conflict with src/.
def generatedSrcDir = file("${buildDir}/generated/sources/version/java")

tasks.register('generateVersionSource') {
    def outputFile = file("${generatedSrcDir}/org/triplehelix/wpilogmcp/Version.java")
    inputs.property('version', project.version)
    outputs.file(outputFile)
    doLast {
        outputFile.parentFile.mkdirs()
        outputFile.text = """\
package org.triplehelix.wpilogmcp;

/**
 * Auto-generated from build.gradle version property.
 * Do not edit — change the version in build.gradle instead.
 */
public final class Version {
  public static final String VERSION = "${project.version}";
  private Version() {}
}
"""
    }
}

sourceSets.main.java.srcDir generatedSrcDir
compileJava.dependsOn generateVersionSource

jacoco {
    toolVersion = "0.8.11"
}

jacocoTestReport {
    reports {
        xml.required = true
        html.required = true
    }
}

test {
    finalizedBy jacocoTestReport
}

repositories {
    mavenCentral()
    maven { url 'https://frcmaven.wpi.edu/artifactory/release/' }
}

// Configuration for native libraries (ZIP artifacts need extraction)
configurations {
    testNatives
}

dependencies {
    // WPILib utilities for DataLog reading
    implementation 'edu.wpi.first.wpiutil:wpiutil-java:2026.2.2'
    implementation 'edu.wpi.first.wpimath:wpimath-java:2026.2.2'

    // JSON processing for MCP protocol
    implementation 'com.google.code.gson:gson:2.11.0'

    // Binary serialization for disk cache
    implementation 'org.msgpack:msgpack-core:0.9.8'

    // In-memory cache with weight-based eviction for lazy log value loading
    implementation 'com.github.ben-manes.caffeine:caffeine:3.1.8'

    // Logging
    implementation 'org.slf4j:slf4j-api:2.0.13'
    implementation 'org.slf4j:slf4j-simple:2.0.13'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // WPILib C++ natives for DataLogWriter tests (JNI is bundled inside cpp artifacts in 2026)
    // Only include the platform-specific artifact for the current OS
    def osName = System.getProperty('os.name').toLowerCase()
    if (osName.contains('mac')) {
        testNatives 'edu.wpi.first.wpiutil:wpiutil-cpp:2026.2.2:osxuniversal@zip'
    } else if (osName.contains('win')) {
        testNatives 'edu.wpi.first.wpiutil:wpiutil-cpp:2026.2.2:windowsx86-64@zip'
    } else {
        testNatives 'edu.wpi.first.wpiutil:wpiutil-cpp:2026.2.2:linuxx86-64@zip'
    }
}

// Task to extract native libraries from ZIP files
tasks.register('extractTestNatives', Copy) {
    configurations.testNatives.files.each { file ->
        from(zipTree(file)) {
            include '**/shared/*.dylib'
            include '**/shared/*.so'
            include '**/shared/*.dll'
        }
    }
    into "$buildDir/testnatives"
}

// Make test task depend on native extraction and set the library path
tasks.named('test') {
    dependsOn extractTestNatives
    systemProperty 'wpilib.natives.path', "$buildDir/testnatives"
}

application {
    mainClass = 'org.triplehelix.wpilogmcp.Main'
}

shadowJar {
    archiveBaseName.set('wpilog-mcp')
    archiveClassifier.set('all')
    archiveVersion.set(version)

    manifest {
        attributes 'Main-Class': 'org.triplehelix.wpilogmcp.Main'
    }
}

tasks.named('test') {
    useJUnitPlatform()
}

// Convenience task to build the fat JAR
tasks.register('buildMcp') {
    dependsOn shadowJar
    doLast {
        println "Built: build/libs/wpilog-mcp-${version}-all.jar"
    }
}

// ==================== Install Task ====================
// Installs wpilog-mcp to ~/.wpilog-mcp/ with versioned JAR, launcher script,
// and a default config file (if none exists).
//
// Layout:
//   ~/.wpilog-mcp/
//   ├── jars/wpilog-mcp-{version}.jar    # versioned JARs (multiple versions can coexist)
//   ├── bin/
//   │   ├── wpilog-mcp-{version}.sh      # versioned launcher script
//   │   └── wpilog-mcp -> wpilog-mcp-{version}.sh  # symlink to current version
//   └── servers.json                      # server configurations (preserved on upgrade)

tasks.register('install') {
    dependsOn shadowJar
    group = 'application'
    description = 'Install wpilog-mcp to ~/.wpilog-mcp/'

    doLast {
        def home = System.getProperty('user.home')
        def installDir = file("${home}/.wpilog-mcp")
        def jarsDir = file("${installDir}/jars")
        def binDir = file("${installDir}/bin")
        def os = System.getProperty('os.name', '').toLowerCase()
        def isWindows = os.contains('win')

        // Create directory structure
        jarsDir.mkdirs()
        binDir.mkdirs()

        // Copy the shadow JAR with versioned name
        def jarName = "wpilog-mcp-${version}.jar"
        def targetJar = file("${jarsDir}/${jarName}")
        def sourceJar = file("${buildDir}/libs/wpilog-mcp-${version}-all.jar")
        if (!sourceJar.exists()) {
            throw new GradleException("Shadow JAR not found: ${sourceJar}")
        }
        copy {
            from sourceJar
            into jarsDir
            rename { jarName }
        }
        println "Installed JAR: ${targetJar}"

        if (isWindows) {
            // Windows batch launcher
            def batFile = file("${binDir}/wpilog-mcp-${version}.bat")
            batFile.text = """\
@echo off
REM wpilog-mcp ${version} launcher
REM Auto-generated by ./gradlew install

REM Memory management is automatic. Set WPILOG_MAX_HEAP to control heap size.
set MAX_HEAP=%WPILOG_MAX_HEAP%
if "%MAX_HEAP%"=="" set MAX_HEAP=4g

REM Prefer WPILib 2026 JDK if available
set JAVA_EXEC=java
if exist "%USERPROFILE%\\wpilib\\2026\\jdk\\bin\\java.exe" (
    set JAVA_EXEC=%USERPROFILE%\\wpilib\\2026\\jdk\\bin\\java.exe
)

"%JAVA_EXEC%" -Xmx%MAX_HEAP% -jar "${jarsDir.absolutePath.replace('/', '\\')}\\${jarName}" %*
"""
            println "Installed launcher: ${batFile}"

            // Create "current" copy
            def currentBat = file("${binDir}/wpilog-mcp.bat")
            currentBat.text = batFile.text
            println "Updated current: ${currentBat}"
        } else {
            // Unix shell launcher
            def scriptFile = file("${binDir}/wpilog-mcp-${version}")
            scriptFile.text = """\
#!/bin/sh
# wpilog-mcp ${version} launcher
# Auto-generated by ./gradlew install

# Memory management is automatic. Set WPILOG_MAX_HEAP to control JVM heap size.
# More heap = more room for decoded log values in cache.
MAX_HEAP="\${WPILOG_MAX_HEAP:-4g}"

# Prefer WPILib 2026 JDK if available
JAVA_EXEC="java"
if [ -f "\${HOME}/wpilib/2026/jdk/bin/java" ]; then
    JAVA_EXEC="\${HOME}/wpilib/2026/jdk/bin/java"
fi

exec "\${JAVA_EXEC}" -Xmx\${MAX_HEAP} -jar "${jarsDir.absolutePath}/${jarName}" "\$@"
"""
            scriptFile.setExecutable(true)
            println "Installed launcher: ${scriptFile}"

            // Create/update "current" symlink
            def currentLink = file("${binDir}/wpilog-mcp").toPath()
            java.nio.file.Files.deleteIfExists(currentLink)
            java.nio.file.Files.createSymbolicLink(currentLink, scriptFile.toPath().fileName)
            println "Updated symlink: ${currentLink} -> ${scriptFile.name}"
        }

        // Create default config if none exists
        def configFile = file("${installDir}/servers.json")
        if (!configFile.exists()) {
            configFile.text = """\
{
  "defaults": {
    "team": 0
  },
  "servers": {
    "default": {
      "logdir": "~/wpilib/logs",
      "transport": "stdio"
    },
    "http": {
      "logdir": "~/wpilib/logs",
      "transport": "http",
      "port": 2363
    }
  }
}
"""
            println "Created default config: ${configFile}"
            println "  Edit this file to set your team number and log directory."
        } else {
            println "Config file already exists: ${configFile} (not overwritten)"
        }

        println ""
        if (isWindows) {
            println "Add to your PATH:  ${binDir}"
            println ""
            println "Usage:"
            println "  wpilog-mcp [options]              Legacy CLI mode"
            println "  wpilog-mcp start default           Start named config (stdio)"
            println "  wpilog-mcp start http              Start named config (HTTP daemon)"
        } else {
            // Check if bin dir is already on PATH
            def pathDirs = System.getenv('PATH')?.split(':') ?: []
            if (!pathDirs.contains(binDir.absolutePath)) {
                println "Add to your shell profile (~/.zshrc or ~/.bashrc):"
                println "  export PATH=\"\${HOME}/.wpilog-mcp/bin:\$PATH\""
                println ""
            }
            println "Usage:"
            println "  wpilog-mcp [options]              Legacy CLI mode"
            println "  wpilog-mcp start default           Start named config (stdio)"
            println "  wpilog-mcp start http              Start named config (HTTP daemon)"
        }
    }
}

// ==================== Stress Test Task ====================
// Stress tests load configuration from the "stresstest" named config in servers.json.
// Add a "stresstest" entry to ~/.wpilog-mcp/servers.json (or .wpilog-mcp.json in project root):
//
//   {
//     "servers": {
//       "stresstest": {
//         "logdir": "/path/to/your/logs",
//         "tba_key": "${TBA_API_KEY}"
//       }
//     }
//   }

import groovy.json.JsonSlurper

/**
 * Checks if a "stresstest" configuration exists in any servers.json file.
 * Returns the config file path if found, or null if not configured.
 */
String findStressTestConfig(String explicitPath) {
    if (explicitPath) {
        def f = new File(explicitPath)
        if (!f.exists()) {
            throw new GradleException("Config file not found: ${explicitPath}")
        }
        return explicitPath
    }

    def candidates = [
        new File(projectDir, '.wpilog-mcp.json'),
        new File(System.getProperty('user.home'), '.wpilog-mcp/servers.json'),
    ]

    for (candidate in candidates) {
        if (candidate.exists()) {
            try {
                def json = new JsonSlurper().parse(candidate)
                if (json.servers?.stresstest != null) {
                    return candidate.absolutePath
                }
            } catch (Exception e) {
                // Skip unparseable files
            }
        }
    }
    return null
}

/**
 * Returns the JVM heap size for stress tests.
 * Uses WPILOG_MAX_HEAP env var or defaults to 4g.
 */
String computeHeapSize(String configFile) {
    def envHeap = System.getenv('WPILOG_MAX_HEAP')
    if (envHeap) {
        println "Heap size: ${envHeap} (from WPILOG_MAX_HEAP)"
        return envHeap
    }
    return '4g'
}

tasks.register('stdioStressTest') {
    description = 'Run stdio integration stress test using "stresstest" config from servers.json'
    group = 'verification'
    dependsOn extractTestNatives

    doLast {
        String explicitPath = project.findProperty('configpath') ?: ''
        String configFile = findStressTestConfig(explicitPath)

        if (!configFile) {
            throw new GradleException('''
No "stresstest" configuration found.

Add a "stresstest" entry to ~/.wpilog-mcp/servers.json or .wpilog-mcp.json:

  {
    "servers": {
      "stresstest": {
        "logdir": "/path/to/your/logs",
        "tba_key": "${TBA_API_KEY}"
      }
    }
  }
''')
        }

        def heapSize = computeHeapSize(configFile)

        println ''
        println '========================================'
        println 'wpilog-mcp Stdio Stress Test'
        println '========================================'
        println "Config: ${configFile}"
        println "Heap: ${heapSize}"
        println ''

        def result = javaexec {
            classpath = sourceSets.test.runtimeClasspath
            mainClass = 'org.junit.platform.console.ConsoleLauncher'

            args 'execute',
                 '--select-class', 'org.triplehelix.wpilogmcp.integration.StressTest',
                 '--details', 'verbose',
                 '--disable-banner'

            maxHeapSize = heapSize

            systemProperty 'stress.enabled', 'true'
            systemProperty 'stress.configpath', configFile
            systemProperty 'wpilib.natives.path', "${buildDir}/testnatives"

            // SLF4J config
            systemProperty 'org.slf4j.simpleLogger.defaultLogLevel', 'debug'
            systemProperty 'org.slf4j.simpleLogger.showDateTime', 'true'
            systemProperty 'org.slf4j.simpleLogger.dateTimeFormat', 'yyyy-MM-dd HH:mm:ss.SSS'
            systemProperty 'org.slf4j.simpleLogger.showThreadName', 'true'
            systemProperty 'org.slf4j.simpleLogger.showLogName', 'true'

            ignoreExitValue = true
        }

        if (result.exitValue != 0) {
            println "\nStdio stress tests completed with failures (exit code: ${result.exitValue})"
        }
    }
}

tasks.register('httpStressTest') {
    description = 'Run HTTP transport stress test using "stresstest" config from servers.json'
    group = 'verification'
    dependsOn 'compileTestJava', extractTestNatives

    doLast {
        String explicitPath = project.findProperty('configpath') ?: ''
        String configFile = findStressTestConfig(explicitPath)

        if (!configFile) {
            throw new GradleException('''
No "stresstest" configuration found.

Add a "stresstest" entry to ~/.wpilog-mcp/servers.json or .wpilog-mcp.json:

  {
    "servers": {
      "stresstest": {
        "logdir": "/path/to/your/logs",
        "tba_key": "${TBA_API_KEY}"
      }
    }
  }
''')
        }

        def heapSize = computeHeapSize(configFile)

        println ''
        println '========================================'
        println 'HTTP Transport Stress Test'
        println '========================================'
        println "Config: ${configFile}"
        println "Heap: ${heapSize}"
        println ''

        def result = javaexec {
            classpath = sourceSets.test.runtimeClasspath
            mainClass = 'org.junit.platform.console.ConsoleLauncher'

            args 'execute',
                 '--select-class', 'org.triplehelix.wpilogmcp.integration.HttpStressTest',
                 '--details', 'verbose',
                 '--disable-banner'

            maxHeapSize = heapSize

            systemProperty 'stress.enabled', 'true'
            systemProperty 'stress.configpath', configFile
            systemProperty 'wpilib.natives.path', "${buildDir}/testnatives"
            systemProperty 'org.slf4j.simpleLogger.defaultLogLevel', 'warn'

            ignoreExitValue = true
        }

        if (result.exitValue != 0) {
            println "\nHTTP stress tests completed with failures (exit code: ${result.exitValue})"
        }
    }
}

tasks.register('stressTest') {
    description = 'Run both stdio and HTTP stress tests using "stresstest" config from servers.json'
    group = 'verification'
    dependsOn 'stdioStressTest', 'httpStressTest'
}

// Add JUnit Platform Console dependency for stressTest task
dependencies {
    testRuntimeOnly 'org.junit.platform:junit-platform-console:1.10.2'
}

tasks.register('measureMemory') {
    dependsOn classes
    doLast {
        def logPath = project.findProperty('logfile') ?: ''
        if (!logPath) {
            throw new GradleException('Usage: ./gradlew measureMemory -Plogfile=/path/to/file.wpilog')
        }
        javaexec {
            classpath = sourceSets.main.runtimeClasspath
            mainClass = 'org.triplehelix.wpilogmcp.Main'
            maxHeapSize = '4g'
            // We'll use a special --measure flag
            args '--measure-memory', logPath
        }
    }
}
