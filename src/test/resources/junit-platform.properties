# On Windows, DataLogReader memory-maps WPILOG files via MappedByteBuffer.
# Java does not provide a way to explicitly unmap these buffers, so the files
# remain locked until GC collects the buffer. JUnit's @TempDir cleanup fails
# because it cannot delete these locked files, causing test failures.
#
# Setting cleanup to NEVER prevents @TempDir from attempting file deletion,
# allowing the OS to clean up temp files on its own schedule.
junit.jupiter.tempdir.cleanup.mode.default=NEVER
